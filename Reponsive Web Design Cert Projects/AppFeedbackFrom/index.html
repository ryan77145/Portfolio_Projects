<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale = 1.0">
    <meta name="description" content="freeCodeCamp Certification Project">
    <meta property="og:title" content="Survey Project" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.ryanshill.com/projects/survey-form" />
    <meta property="og:site_name" content="Ryan Shill" />
    <meta property="og:image" content="https://www.ryanshill.com/Assets/ogTagLogo.webp" />
    <meta property="og:description" content="freeCodeCamp Certification Project" />
    <link rel="icon" href="/Assets/RyanShillCoLogo.webp">
    <link rel="canonical" href="https://www.ryanshill.com/projects/survey-form">
    <title>Survey Form</title>
  </head>

  <body>
    <main>
      <h1 id="title">App Feedback Form</h1>
      <p id="description">Use this form to provide general feedback for the application. All feedback is encouraged and appreciated.</p>
      <form id="survey-form">
        <label for="name" id="name-label">First Name: </label>

        <input 
        id="name" 
        type="text" 
        required
        placeholder="Jane Doe"><br>

        <label id="email-label" for="email">Email: </label>

        <input 
        id="email" 
        type="email" 
        required
        placeholder="janedoe@email.com"><br>

        <label for="number" id="number-label">Phone Number: </label>

        <input 
        id="number" 
        type="number" 
        required 
        min="1000000000" 
        max="9999999999"
        placeholder="555-555-5555"><br>

        <label for="dropdown">Would you recommend to a friend?</label>
        <select id="dropdown" name="recommend">
        <option value="yes">Yes</option>
        <option value="no">No</option>
        </select><br>
        
        <label id="radio-design">Design: </label>
        <input type="radio" name="design" value="poor">Poor
        <input type="radio" name="design" value="good">Good
        <input type="radio" name="design" value="great">Great
        <input type="radio" name="design" value="excellent">Excellent
        <br>
        

        <label id="radio-useful">How useful do you find the application? </label>
        <input type="radio" name="useful" value="not">Not Very
        <input type="radio" name="useful" value="kindof">Kind of
        <input type="radio" name="useful" value="useful">Useful
        <input type="radio" name="useful" value="very">Very Useful
        <br>
      
        <label id="checkbox">Favorite feature?</label>
        <input type="checkbox" value="sets" name="sets">Set Tracker
        <input type="checkbox" name="investment" value="investment">Investment Management
        <input type="checkbox" name="pieces" value="pieces">Piece Tracker
        <input type="checkbox" name="other" value="other">Other
        <br>

        <label id="comments">Comments/Suggestions:
          <textarea id="comments" minlength="50" maxlength="200"></textarea>
          <br>
          <button type=submit id="submit">Submit</button>

      </label>
      </form>
    </main>
  </body>
</html>
